---
- name: Deploy to Tomcat
  hosts: web
  become: yes
  tasks:
    - name: Copy WAR file to Tomcat
      copy:
      	src: 
      	dest: "/opt/tomact/webapps/2023MavneWebAppPipelineWithAnsible.war"
      	remote_src: no
      	
    - name: Restart Tomcat
      systemd:
      	name: tomcat
      	state: restarted
